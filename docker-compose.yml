services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: saathipill
      POSTGRES_PASSWORD: saathipill
      POSTGRES_DB: saathipill
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U saathipill"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://saathipill:saathipill@postgres:5432/saathipill?schema=public
      PORT: "3000"
      NODE_ENV: production
      TZ: ${TZ:-Asia/Kolkata}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://localhost:5174}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-BKvCKHiHFe2odTjOtCE62Zu_C3qaegPN2RofKS-BL2XQBow8gMIeF6nBR7-4qicCpvlTQ_sxKYRKd5ngdv1ITpU}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-u0krV1zvLYRGLBvDaEUwObA8QnfOQwtoaUJNvYgKK8I}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-mailto:care@arogya.in}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    # On boot: apply migrations, seed ONLY if the database is empty (never
    # overwrites existing data), then start the API. A full reset is opt-in via start.cmd.
    command: sh -c "npx prisma migrate deploy && npx tsx prisma/seed.ts --if-empty || true; npm run start"

  worker:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://saathipill:saathipill@postgres:5432/saathipill?schema=public
      NODE_ENV: production
      TZ: ${TZ:-Asia/Kolkata}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-BKvCKHiHFe2odTjOtCE62Zu_C3qaegPN2RofKS-BL2XQBow8gMIeF6nBR7-4qicCpvlTQ_sxKYRKd5ngdv1ITpU}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-u0krV1zvLYRGLBvDaEUwObA8QnfOQwtoaUJNvYgKK8I}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-mailto:care@arogya.in}
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "npm run worker:start"

volumes:
  pgdata:
