server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Serve .jsx to the in-browser Babel transpiler with a JS content type.
  types {
    text/html                             html htm;
    text/javascript                       js jsx mjs;
    text/css                              css;
    image/png                             png;
    image/svg+xml                         svg;
    application/json                      json webmanifest;
    image/x-icon                          ico;
  }
  default_type application/octet-stream;

  location = / {
    add_header Cache-Control "no-store, no-cache, must-revalidate";
    try_files /index.html =404;
  }
  location ~* \.(html|json|webmanifest)$ {
    add_header Cache-Control "no-store, no-cache, must-revalidate";
  }
  location = /sw.js        { add_header Cache-Control "no-store"; }
  location = /config.js    { add_header Cache-Control "no-store"; }
  location = /env.js       { add_header Cache-Control "no-store"; }
  location ~* \.jsx$       { add_header Cache-Control "no-store"; }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
