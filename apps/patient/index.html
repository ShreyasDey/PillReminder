<!DOCTYPE html>
<html lang="en">
<head>

<meta name="mobile-web-app-capable" content="yes" />

<title>Arogya v2 — Pill Reminder App</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>

<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; background: #1C1008; overflow: hidden; }
  body { display: flex; align-items: center; justify-content: center; font-family: 'Plus Jakarta Sans', sans-serif; }
  ::-webkit-scrollbar { width: 0; height: 0; }
  button { -webkit-tap-highlight-color: transparent; }
  input, textarea { -webkit-appearance: none; }
</style>

<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "fontSize": 15,
  "cornerRadius": 15,
  "accentColor": "#1D62A6",
  "showPhoneFrame": true,
  "userName": "Shreyas",
  "showDemoHints": false,
  "isOffline": false
}/*EDITMODE-END*/;

// ── Bottom Navigation ──
function BottomNav({ activeTab, onTab }) {
  const tabs = [
    { id: 'home', icon: '💊', label: 'Today' },
    { id: 'family', icon: '👨‍👩‍👧', label: 'Family' },
    { id: 'refills', icon: '🏪', label: 'Refills' },
    { id: 'profile', icon: '👤', label: 'Profile' },
  ];
  return (
    <div style={{
      position: 'absolute', bottom: 0, left: 0, right: 0,
      height: 72, background: C.white,
      borderTop: `1px solid ${C.border}`,
      display: 'flex', alignItems: 'center',
      paddingBottom: 8,
      zIndex: 100,
    }}>
      {tabs.map(t => (
        <button key={t.id} onClick={() => onTab(t.id)} style={{
          flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center',
          gap: 4, border: 'none', background: 'none', cursor: 'pointer',
          padding: '8px 0',
        }}>
          <div style={{
            width: 40, height: 32, borderRadius: 12, display: 'flex', alignItems: 'center', justifyContent: 'center',
            background: activeTab === t.id ? C.coralLight : 'transparent',
            transition: 'background 0.2s',
            fontSize: 20,
          }}>{t.icon}</div>
          <span style={{
            fontFamily: fonts.body, fontSize: 11, fontWeight: 700,
            color: activeTab === t.id ? C.coral : C.textMuted,
            transition: 'color 0.2s',
          }}>{t.label}</span>
        </button>
      ))}
    </div>
  );
}

// ── Screen transition wrapper ──
function ScreenSlide({ children, visible, direction = 'right' }) {
  return (
    <div style={{
      position: 'absolute', inset: 0,
      transform: visible ? 'translateX(0)' : direction === 'right' ? 'translateX(100%)' : 'translateX(-100%)',
      transition: 'transform 0.32s cubic-bezier(0.4, 0, 0.2, 1)',
      display: 'flex', flexDirection: 'column',
      background: C.cream,
      zIndex: visible ? 10 : 5,
      pointerEvents: visible ? 'auto' : 'none',
    }}>{children}</div>
  );
}

// ── Main App ──
function App() {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);

  // Apply tweaks as CSS variables live
  useEffect(() => {
    const style = document.getElementById('tweak-overrides') || (() => {
      const s = document.createElement('style');
      s.id = 'tweak-overrides';
      document.head.appendChild(s);
      return s;
    })();
    style.textContent = `
      :root {
        --tweak-font-size: ${tweaks.fontSize}px;
        --tweak-accent: ${tweaks.accentColor};
        --tweak-radius: ${tweaks.cornerRadius}px;
      }
      #root * { font-size: inherit; }
    `;
    // Also update C.coral live so components pick it up
    C.coral = tweaks.accentColor;
    C.coralLight = tweaks.accentColor + '22';
    C.coralDark = tweaks.accentColor;
  }, [tweaks.fontSize, tweaks.accentColor, tweaks.cornerRadius]);

  // Main flow state
  const [screen, setScreen] = useState('splash');
  const [tab, setTab] = useState('home');
  const [overlayScreen, setOverlayScreen] = useState(null);
  const [overlayData, setOverlayData] = useState(null);

  // The signed-in account's real name (stored at login). The tweaks value is
  // only a fallback for demo mode — never show it over a real account.
  const displayName = (window.SaathiPillAPI && SaathiPillAPI.enabled && SaathiPillAPI.hasSession() && SaathiPillAPI.userName()) || tweaks.userName;
  // Which dose's reminder card is currently on screen (null when none) — used
  // to dismiss it when the same dose is acted on elsewhere (desktop
  // notification, another tab/device, a caregiver).
  const openReminderRef = useRef(null);
  useEffect(() => {
    openReminderRef.current = (overlayScreen === 'reminder' && overlayData && overlayData.doseLogId) ? overlayData.doseLogId : null;
  }, [overlayScreen, overlayData]);

  // Caregiver invite deep-link: a family member opens a link like
  //   ?invite=1&name=Priya&rel=Daughter&by=Shreyas&perm=view
  // and lands on a pre-filled sign-up. Parsed once on load.
  const [inviteData] = useState(() => {
    try {
      const p = new URLSearchParams(window.location.search);
      if (!p.get('invite')) return null;
      return {
        name: p.get('name') || '',
        relation: p.get('rel') || '',
        by: p.get('by') || '',
        perm: p.get('perm') || 'view',
        // The invite row's id — lets the invited person see & accept THIS invite
        // even if the phone number on it doesn't match their account.
        link: p.get('link') || null,
        // The invited number already has an account → open LOG IN, prefilled.
        existing: p.get('existing') === '1',
        phone: (p.get('phone') || '').replace(/\D/g, '').slice(-10),
      };
    } catch (e) { return null; }
  });

  // Pharmacy QR deep-link: scanning the counter QR opens ?join=<code>&pharmacy=<name>.
  // After sign-in (new or existing account) the pharmacy is linked automatically.
  const [joinData, setJoinData] = useState(() => {
    try {
      const p = new URLSearchParams(window.location.search);
      const code = p.get('join');
      if (!code) return null;
      return { code: code.toUpperCase(), name: p.get('pharmacy') || '' };
    } catch (e) { return null; }
  });
  const linkJoinPharmacy = () => {
    const api = window.SaathiPillAPI;
    if (!joinData || !api || !api.enabled || !api.hasSession()) return;
    const jd = joinData;
    setJoinData(null); // one-shot
    api.addPharmacy(jd.code).then(function () {
      try { window.dispatchEvent(new CustomEvent('sp_pharmacies_changed')); } catch (e) {}
      showToast(`🏥 Linked to ${jd.name || jd.code} — order refills from the Refills tab`, { duration: 4500 });
    }).catch(function () {
      showToast('⚠ Could not link the pharmacy — add it in Profile → Pharmacy partner', { duration: 4500 });
    });
  };
  const [isNewUser, setIsNewUser] = useState(false);
  const [userMeds, setUserMeds] = useState(null);
  const [familyMeds, setFamilyMeds] = useState({}); // keyed by member name
  const [userSymptoms, setUserSymptoms] = useState([]);
  const [userAppointments, setUserAppointments] = useState([]);
  // Real per-day adherence history from the backend (empty for new users / demo mode).
  const [adherenceDaily, setAdherenceDaily] = useState([]);

  // ── Prescriptions pushed in from the Pharmacy Portal (shared localStorage) ──
  const [pharmacyPushes, setPharmacyPushes] = useState(() =>
    (typeof PharmacyBridge !== 'undefined' ? PharmacyBridge.read() : []));
  const pendingPushes = pharmacyPushes.filter(p => p.status === 'pending');
  const prevPendingRef = useRef(pendingPushes.length);

  const handleAddSymptom = (payload) => {
    setUserSymptoms((prev) => [...prev, { ...payload, timestamp: new Date().toISOString() }]);
    const api = window.SaathiPillAPI;
    if (api && api.enabled && api.hasSession()) {
      api.addSymptom({ symptoms: payload.symptoms || [], mood: payload.mood, note: payload.note, linkedMed: payload.linkedMed || undefined })
        .then(function () { return api.symptoms(); })
        .then(function (list) { setUserSymptoms(list || []); })
        .catch(function () {});
    }
  };
  const handleAddAppointment = (payload) => {
    // payload.date is a Date; normalize to ISO
    const iso = payload.date instanceof Date ? payload.date.toISOString() : new Date(payload.date).toISOString();
    setUserAppointments((prev) => [...prev, { ...payload, date: iso, id: Date.now() }]);
    const api = window.SaathiPillAPI;
    if (api && api.enabled && api.hasSession()) {
      api.addAppointment({ doctor: payload.doctor || 'Doctor', specialty: payload.specialty, date: iso, time: payload.time || '', location: payload.location, reason: payload.reason, reminderLead: payload.reminderLead })
        .then(function () { return api.appointments(); })
        .then(function (list) { setUserAppointments(list || []); })
        .catch(function () {});
    }
  };

  const handleToggleMed = (id) => {
    // Persist to the backend when newly marked taken (real adherence).
    const current = (userMeds || medicines).find(m => m.id === id);
    const willBeTaken = current ? !current.taken : true;
    const api = window.SaathiPillAPI;
    if (api && api.enabled && api.hasSession() && current && current.doseLogId && willBeTaken && !isOffline) {
      api.markDose(current.doseLogId, 'take').catch(function () {});
    }
    // Acting in the app dismisses the matching desktop notification too.
    if (current && current.doseLogId && willBeTaken) closeDoseNotification(current.doseLogId);
    setUserMeds(prev => (prev || medicines).map(m => m.id === id ? { ...m, taken: !m.taken, takenAt: !m.taken ? new Date().toISOString() : null, skipped: false, skipDate: null, skipReason: null, skipIcon: null, skipExcluded: false } : m));
    // L-11: any toggle while offline is queued for sync
    if (isOffline) {
      setPendingSync(prev => ({ ...prev, [id]: true }));
    }
  };

  // Stop a medicine the doctor has discontinued → remove it from the app entirely.
  const handleStopMed = (med) => {
    const groupId = med && med.groupId;
    setUserMeds(prev => (prev || []).filter(m => groupId ? m.groupId !== groupId : m.id !== (med && med.id)));
    const api = window.SaathiPillAPI;
    if (api && api.enabled && api.hasSession() && groupId) {
      api.deleteMedication(groupId).then(function () { loadRealData(); }).catch(function () {});
    }
    showToast('🛑 Medicine stopped & removed');
  };

  // Auto-flush pending-sync queue when connection returns (L-11)
  // Issue #2: include pendingSync in deps so flushes ALSO fire for items queued
  // *after* the device comes back online (e.g. network flapping)
  useEffect(() => {
    if (!isOffline && Object.keys(pendingSync).length > 0) {
      const count = Object.keys(pendingSync).length;
      const timer = setTimeout(() => {
        setPendingSync({});
        showToast(`✓ Synced ${count} update${count > 1 ? 's' : ''} to caregivers`, { duration: 2400 });
      }, 800);
      return () => clearTimeout(timer);
    }
  }, [isOffline, pendingSync]); // eslint-disable-line

  const handleAddMed = (med) => {
    const timeMap = { morning: '8:00 AM', afternoon: '1:00 PM', evening: '5:00 PM', night: '9:00 PM', ...(med.customTimesMap || {}) };
    const courseEndDate = med.courseType === 'fixed' && med.courseDays
      ? new Date(Date.now() + med.courseDays * 86400000).toISOString()
      : null;
    const mealLabel = med.meal === 'before' ? 'Before meal' : med.meal === 'after' ? 'After meal' : med.meal === 'empty' ? 'Empty stomach' : 'At bedtime';

    // Build a short schedule label for non-daily schedules so the home card communicates it
    let scheduleLabel = null;
    if (med.schedule === 'weekly' && med.weeklyDays && med.weeklyDays.length > 0) {
      const letters = ['S', 'M', 'T', 'W', 'T', 'F', 'S'];
      if (med.weeklyDays.length === 7) {
        scheduleLabel = null; // every day = same as daily
      } else if (med.weeklyDays.length === 5 && [1,2,3,4,5].every(d => med.weeklyDays.includes(d))) {
        scheduleLabel = 'Weekdays';
      } else if (med.weeklyDays.length === 2 && [0,6].every(d => med.weeklyDays.includes(d))) {
        scheduleLabel = 'Weekends';
      } else {
        scheduleLabel = med.weeklyDays.map(d => letters[d]).join(' · ');
      }
    } else if (med.schedule === 'cyclic' && med.cyclicOn) {
      scheduleLabel = `${med.cyclicOn} on / ${med.cyclicOff || 0} off`;
    }

    // Today is in the "on" phase for weekly/cyclic? (controls whether dose entries appear today)
    const today = new Date();
    let activeToday = true;
    if (med.schedule === 'weekly' && med.weeklyDays) {
      activeToday = med.weeklyDays.includes(today.getDay());
    }
    // Cyclic: treat today as day-1 of the "on" phase (so it shows up today by default)

    // Helper to convert "8:00 AM" → minutes-from-midnight, for chronological sort
    const toMinutes = (t) => {
      const m = t.match(/^(\d{1,2}):(\d{2})\s*(AM|PM)$/i);
      if (!m) return 0;
      let h = parseInt(m[1], 10) % 12;
      if (m[3].toUpperCase() === 'PM') h += 12;
      return h * 60 + parseInt(m[2], 10);
    };

    // One entry per scheduled time — so each dose shows up separately in today's list
    const timeIds = med.times && med.times.length > 0 ? med.times : ['morning'];
    const groupId = Date.now() * 1000 + Math.floor(Math.random() * 1000);
    const newEntries = timeIds
      .map((tid) => timeMap[tid] || '8:00 AM')
      .sort((a, b) => toMinutes(a) - toMinutes(b))
      .map((timeStr, idx) => ({
        id: groupId + idx,
        groupId,                    // links all doses of the same medicine
        doseIndex: idx + 1,
        doseTotal: timeIds.length,
        name: med.drug || 'Medicine',
        dose: med.dose || '1 tablet',
        time: timeStr,
        meal: mealLabel,
        icon: '💊',
        taken: false,
        color: C.coral,
        courseType: med.courseType || 'ongoing',
        courseEndDate,
        schedule: med.schedule || 'daily',
        scheduleLabel,
        activeToday,
        source: med.source || null,
        instructions: med.instructions || null,
        doctor: med.doctor || null,
      }));

    setUserMeds(prev => [...(prev || []), ...newEntries]);

    // Persist to the backend so the medicine survives logout. On next load,
    // loadRealData replaces the temporary entries with the saved ones (real IDs).
    const api = window.SaathiPillAPI;
    if (api && api.enabled && api.hasSession()) {
      api.addMedication(medApiPayload(med)).then(function () { loadRealData(); }).catch(function () {});
    }
  };

  // Normalize a med from the Add-Medicine flow into the backend payload shape.
  // Shared by self-add (handleAddMed) and caregiver-add (add on a patient's behalf).
  const medApiPayload = (med) => ({
    drug: med.drug, dose: med.dose, times: med.times, customTimesMap: med.customTimesMap || null,
    meal: med.meal, schedule: med.schedule || 'daily', weeklyDays: med.weeklyDays || [],
    cyclicOn: med.cyclicOn || null, cyclicOff: med.cyclicOff || null,
    courseType: med.courseType || 'ongoing', courseDays: med.courseDays || null,
    instructions: med.instructions || null, doctor: med.doctor || null, source: med.source || null,
  });

  // Success toast — improvement #9 (better position) + #15 (offline indicator)
  const [toast, setToast] = useState(null);
  const isOffline = !!tweaks.isOffline;

  // Track snooze counts per medicine — fixes L-06 (unbounded snooze loop)
  const [snoozeCounts, setSnoozeCounts] = useState({});
  // Track which "taken" marks were made while offline — fixes L-11 (pending sync indicator)
  const [pendingSync, setPendingSync] = useState({});
  const showToast = (msg, opts = {}) => {
    setToast({ msg, ...opts });
    setTimeout(() => setToast(null), opts.duration || 2800);
  };
  // Screens outside the App component tree (e.g. MedicineCard) can toast too.
  window.spToast = showToast;

  // Keep pharmacy pushes in sync with the portal (this tab + other tabs)
  useEffect(() => {
    if (typeof PharmacyBridge === 'undefined') return;
    setPharmacyPushes(PharmacyBridge.read());
    return PharmacyBridge.subscribe(setPharmacyPushes);
  }, []);

  // Announce newly-arrived prescriptions from the pharmacy
  useEffect(() => {
    const n = pendingPushes.length;
    if (n > prevPendingRef.current) {
      const latest = pendingPushes[0];
      const count = latest?.meds?.length || 0;
      showToast(`🏪 ${latest?.pharmacyName || 'Your pharmacy'} sent ${count} medicine${count > 1 ? 's' : ''}`, { duration: 3600 });
    }
    prevPendingRef.current = n;
  }, [pendingPushes.length]); // eslint-disable-line

  const handleAcceptPush = (push) => {
    (push.meds || []).forEach(m => handleAddMed({ ...m, source: { type: 'pharmacy', name: push.pharmacyName, code: push.pharmacyCode } }));
    if (typeof PharmacyBridge !== 'undefined') PharmacyBridge.update(push.id, { status: 'accepted' });
    const n = (push.meds || []).length;
    showToast(`✓ Added ${n} medicine${n > 1 ? 's' : ''} from ${push.pharmacyName}`);
  };

  const handleDismissPush = (push) => {
    if (typeof PharmacyBridge !== 'undefined') PharmacyBridge.update(push.id, { status: 'dismissed' });
    showToast('Prescription dismissed');
  };

  const navigate = useCallback((target, data) => {
    setOverlayData(data || null);
    setOverlayScreen(target);
  }, []);

  const closeOverlay = () => {
    setOverlayScreen(null);
    setOverlayData(null);
  };

  const mainTabs = ['home', 'family', 'refills', 'profile'];
  const isInMainApp = mainTabs.includes(screen);

  // Load the signed-in user's REAL data from the backend (meds + adherence history).
  // Returns true if it loaded; false in demo/offline mode so callers can fall back.
  const loadRealData = useCallback(async () => {
    const api = window.SaathiPillAPI;
    if (!api || !api.enabled || !api.hasSession()) return false;
    try {
      const [dash, daily] = await Promise.all([api.dashboard(), api.dailyAdherence(90)]);
      const cards = (dash.medications || []).map(window.SaathiPillMap.medToCard);
      setUserMeds(cards);
      setAdherenceDaily((daily && daily.series) || []);
      setIsNewUser(cards.length === 0);
      // Saved symptoms + appointments (History, Doctor Report, appointment banner).
      // Non-blocking: a hiccup here never stops meds from loading.
      api.symptoms().then(function (list) { setUserSymptoms(list || []); }).catch(function () {});
      api.appointments().then(function (list) { setUserAppointments(list || []); }).catch(function () {});
      // Pull any pharmacy prescriptions waiting for this patient + go live so new
      // ones arrive instantly while the app is open.
      api.pharmacyPushes().then(function (list) {
        if (window.PharmacyBridge) PharmacyBridge.write(list || []);
      }).catch(function () {});
      if (window.PharmacyBridge && PharmacyBridge.connectRealtime) PharmacyBridge.connectRealtime();
      // Ask for notification permission right away so medicine reminders reach
      // the desktop/phone without hunting for the Profile toggle.
      if (window.SaathiPillPush && SaathiPillPush.autoEnable) SaathiPillPush.autoEnable();
      return true;
    } catch (e) {
      return false; // never block the UI on a backend hiccup
    }
  }, []);

  // ── Medication reminders (Web Push + in-app, kept in sync) ──
  // The desktop notification and the in-app reminder card are two views of the
  // same dose: acting on either one dismisses the other (and any other open
  // tab/device, via the backend's dose.updated broadcast).

  // Dismiss the OS notification for a dose (they're tagged dose-<id> by the SW).
  const closeDoseNotification = (doseId) => {
    if (!doseId || !navigator.serviceWorker) return;
    navigator.serviceWorker.getRegistration().then(function (r) {
      if (!r || !r.getNotifications) return;
      r.getNotifications({ tag: 'dose-' + doseId }).then(function (list) {
        list.forEach(function (n) { n.close(); });
      }).catch(function () {});
    }).catch(function () {});
  };

  useEffect(() => {
    if (window.SaathiPillPush && window.SaathiPillPush.supported) {
      window.SaathiPillPush.register().catch(function () {});
    }
    const openReminderForDose = (doseId, opts) => {
      // Never surface a reminder when not signed in (e.g. a lingering socket
      // event or notification click after logout) — reminders are per-account.
      const api = window.SaathiPillAPI;
      if (api && api.enabled && !api.hasSession()) return;
      const card = (userMeds || []).find(m => m.doseLogId === doseId);
      const med = card || { id: doseId, doseLogId: doseId, name: 'Your medicine', dose: '', time: '' };
      setOverlayData({ ...med, openSheet: !!(opts && opts.openSheet) });
      setOverlayScreen('reminder');
    };
    const onReminder = (e) => { const d = (e && e.detail) || {}; if (d.doseId) openReminderForDose(d.doseId); };
    // The user acted somewhere (this tab, desktop notification, another device,
    // a caregiver) → dismiss the reminder here + the OS notification.
    const onDoseUpdated = (e) => {
      const d = (e && e.detail) || {};
      if (!d.doseId) return;
      closeDoseNotification(d.doseId);
      if (openReminderRef.current === d.doseId) {
        setOverlayScreen(null);
        setOverlayData(null);
        if (d.action === 'take') showToast('✓ Marked as taken');
        else if (d.action === 'snooze') showToast('⏰ Snoozed 10 minutes');
        else if (d.action === 'skip') showToast('Dose skipped');
      }
      if (d.action === 'take' || d.action === 'skip') loadRealData();
    };
    const onSWMessage = (event) => {
      const m = (event && event.data) || {};
      if (m.type !== 'dose-action') return;
      const api = window.SaathiPillAPI;
      const live = api && api.enabled && api.hasSession();
      if (m.action === 'take' && m.doseId) {
        if (live) api.markDose(m.doseId, 'take').then(loadRealData).catch(function () {});
        if (openReminderRef.current === m.doseId) { setOverlayScreen(null); setOverlayData(null); }
        showToast('✓ Marked as taken');
      } else if (m.action === 'snooze' && m.doseId) {
        if (live) api.markDose(m.doseId, 'snooze').catch(function () {});
        if (openReminderRef.current === m.doseId) { setOverlayScreen(null); setOverlayData(null); }
        showToast('⏰ Snoozed 10 minutes');
      } else if (m.action === 'options' && m.doseId) {
        // "Can't take it ▾" on the desktop notification → open the card with
        // the options sheet (snooze / doctor stopped / side effects) already up.
        openReminderForDose(m.doseId, { openSheet: true });
      } else if (m.doseId) {
        openReminderForDose(m.doseId);
      }
    };
    window.addEventListener('sp_dose_reminder', onReminder);
    window.addEventListener('sp_dose_updated', onDoseUpdated);
    if (navigator.serviceWorker) navigator.serviceWorker.addEventListener('message', onSWMessage);
    return () => {
      window.removeEventListener('sp_dose_reminder', onReminder);
      window.removeEventListener('sp_dose_updated', onDoseUpdated);
      if (navigator.serviceWorker) navigator.serviceWorker.removeEventListener('message', onSWMessage);
    };
  }, [userMeds, loadRealData]);

  // Cold start from a desktop notification: when no tab was open, the service
  // worker launches the app with #dose=<id>&action=<take|snooze|options|open>.
  // Perform the action (or open the reminder card) once we're signed in.
  const hashHandledRef = useRef(false);
  useEffect(() => {
    if (hashHandledRef.current) return;
    const m = (window.location.hash || '').match(/#dose=([^&]+)&action=([a-z]+)/);
    if (!m) return;
    const api = window.SaathiPillAPI;
    if (!api || !api.enabled || !api.hasSession()) return;
    const doseId = decodeURIComponent(m[1]);
    const action = m[2];
    // For opening the card, wait until the medicine list has loaded so the
    // card shows real details instead of a placeholder.
    if ((action === 'open' || action === 'options') && userMeds === null) return;
    hashHandledRef.current = true;
    try { history.replaceState(null, '', window.location.pathname + window.location.search); } catch (e) {}
    if (action === 'take') {
      api.markDose(doseId, 'take').then(loadRealData).catch(function () {});
      showToast('✓ Marked as taken');
    } else if (action === 'snooze') {
      api.markDose(doseId, 'snooze').catch(function () {});
      showToast('⏰ Snoozed 10 minutes');
    } else {
      const card = (userMeds || []).find(x => x.doseLogId === doseId);
      setOverlayData({ ...(card || { id: doseId, doseLogId: doseId, name: 'Your medicine', dose: '', time: '' }), openSheet: action === 'options' });
      setOverlayScreen('reminder');
    }
  }, [userMeds, screen]); // eslint-disable-line

  // Catch-up reminder: if a dose came due while the app (or the reminder server)
  // was closed, surface the most overdue pending dose as soon as the app opens —
  // the patient never silently misses one just because nothing was running.
  const bootReminderRef = useRef(false);
  useEffect(() => {
    if (bootReminderRef.current) return;
    if (screen !== 'home' || overlayScreen) return; // wait until we've landed, don't stack overlays
    if (!userMeds || userMeds.length === 0) return;
    bootReminderRef.current = true; // one shot per app open
    const now = new Date();
    const nowMin = now.getHours() * 60 + now.getMinutes();
    const toMin = (t) => { const x = String(t || '').match(/^(\d{1,2}):(\d{2})\s*(AM|PM)$/i); if (!x) return 0; let h = parseInt(x[1], 10) % 12; if (x[3].toUpperCase() === 'PM') h += 12; return h * 60 + parseInt(x[2], 10); };
    // Only catch up on a dose that's due but not long past — matches the server's
    // 2-hour reminder window, so a morning dose won't pop a card at midnight.
    const REMINDER_WINDOW_MIN = 120;
    const overdue = userMeds
      .filter(m => !m.taken && !m.skipped && m.doseLogId && m.remindersOn !== false && toMin(m.time) <= nowMin && (nowMin - toMin(m.time)) <= REMINDER_WINDOW_MIN)
      .sort((a, b) => toMin(b.time) - toMin(a.time))[0]; // most recent still-actionable dose
    if (overdue) {
      setOverlayData(overdue);
      setOverlayScreen('reminder');
    }
  }, [userMeds, screen, overlayScreen]);

  // If someone was invited as a caregiver, surface it right after they sign in so
  // the invite link "just works" — no hunting for the Family tab.
  const surfacePendingInvites = () => {
    const api = window.SaathiPillAPI;
    if (!api || !api.enabled || !api.hasSession()) return;
    // Arrived via an invite link → go straight to Family; the invite card is
    // fetched there by its id, so it works even for a mistyped phone number.
    if (inviteData && inviteData.link) {
      setTab('family'); setScreen('family'); setOverlayScreen(null);
      showToast(`🤝 ${inviteData.by ? inviteData.by + ' invited you' : 'You were invited'} as a caregiver — accept below`, { duration: 4500 });
      return;
    }
    api.caregivingInvites().then(list => {
      if (list && list.length > 0) {
        setTab('family'); setScreen('family'); setOverlayScreen(null);
        showToast(`🤝 ${list[0].ownerName} invited you as a caregiver — accept in Family`, { duration: 4500 });
      }
    }).catch(function () {});
  };

  // After onboarding, go to profile setup, then home
  const handleOnboardingDone = () => setScreen('profileSetup');
  const handleProfileDone = () => { loadRealData(); setScreen('home'); surfacePendingInvites(); linkJoinPharmacy(); };
  const handleLogin = async () => {
    // Real backend session (AuthScreen already verified the OTP) → load real data.
    const loaded = await loadRealData();
    if (!loaded) { setIsNewUser(false); setUserMeds(medicines); } // demo/offline fallback
    setScreen('home');
    surfacePendingInvites();
    linkJoinPharmacy();
  };
  const handleSignUp = (name) => {
    // New account starts genuinely empty — no medicines, no adherence history.
    setIsNewUser(true); setUserMeds([]); setAdherenceDaily([]); setScreen('onboarding');
  };
  const handleLogout = async () => {
    const api = window.SaathiPillAPI;
    // Stop reminders reaching this browser once logged out: unsubscribe this
    // device's push (needs the token, so do it BEFORE clearing the session) and
    // drop the realtime socket. Then revoke the session on the server.
    try { if (window.SaathiPillPush && SaathiPillPush.disable) await SaathiPillPush.disable(); } catch (e) {}
    try { if (window.PharmacyBridge && PharmacyBridge.disconnectRealtime) PharmacyBridge.disconnectRealtime(); } catch (e) {}
    if (api && api.enabled) await api.logout();
    // Clear in-memory state and return to the login screen.
    setUserMeds(null); setAdherenceDaily([]); setIsNewUser(false);
    setUserSymptoms([]); setUserAppointments([]); setPharmacyPushes([]);
    setTab('home'); setOverlayScreen(null); setScreen('auth');
  };

  // Overlay screens map
  const reminderMed = overlayData;
  const reminderId = reminderMed?.id ?? 'default';
  const reminderSnoozes = snoozeCounts[reminderId] || 0;
  const SNOOZE_CAP = 3;

  const overlayScreens = {
    addMed: <AddMedicineScreen
      forMember={overlayData?.forMember || null}
      onDone={(med) => {
        const meds = Array.isArray(med) ? med : [med];
        const member = overlayData?.forMember;
        const caregiverReturn = overlayData?.caregiverReturn;
        if (member) {
          const api = window.SaathiPillAPI;
          const n = meds.length;
          const shortName = (member.ownerName || member.name || '').split(' ')[0];
          // Real caregiving context (a linked patient) → persist to the patient's
          // account via the permission-gated caregiving endpoint.
          if (member.linkId && api && api.enabled && api.hasSession()) {
            Promise.all(meds.map(m => api.caregivingAddMed(member.linkId, medApiPayload(m))))
              .then(() => {
                showToast(`✓ ${n > 1 ? `${n} medicines` : 'Medicine'} added for ${shortName}`);
              })
              .catch(() => showToast('Could not add medicine — check your permission', { kind: 'offline', duration: 3500 }));
            // Return to the caregiver view so the updated list is visible.
            if (caregiverReturn) { setOverlayData(caregiverReturn); setOverlayScreen('caregiver'); }
            else closeOverlay();
          } else {
            // Demo / local dependent (no backend link).
            setFamilyMeds(prev => ({ ...prev, [member.name]: [...(prev[member.name] || []), ...meds] }));
            if (caregiverReturn) { setOverlayData(caregiverReturn); setOverlayScreen('caregiver'); }
            else closeOverlay();
            showToast(`✓ ${n > 1 ? `${n} medicines` : 'Medicine'} added for ${shortName}`);
          }
        } else {
          meds.forEach(handleAddMed);
          closeOverlay();
          const n = meds.length;
          isOffline ? showToast('Saved offline — will sync when online', { kind: 'offline', duration: 3500 }) : showToast(n > 1 ? `✓ ${n} medicines added!` : '✓ Medicine added!');
        }
      }}
      onClose={closeOverlay}
    />,
    logSymptoms: <LogSymptomsScreen onClose={closeOverlay} userMeds={userMeds} onDone={(payload) => { handleAddSymptom(payload); closeOverlay(); const n = payload.symptoms.length; showToast(n > 0 ? `✓ Logged ${n} symptom${n > 1 ? 's' : ''} · added to history & report` : '✓ Mood logged · added to history & report'); }} />,
    addAppointment: <AddAppointmentScreen onClose={closeOverlay} onDone={(apt) => { handleAddAppointment(apt); closeOverlay(); const dateStr = (apt.date instanceof Date ? apt.date : new Date(apt.date)).toLocaleDateString('en-IN', { weekday: 'short', day: 'numeric', month: 'short' }); showToast(`✓ Appointment saved · ${dateStr} at ${apt.time}`); }} />,
    appointmentReminder: <AppointmentReminderModal
      appointment={overlayData}
      onSnooze={() => { closeOverlay(); showToast('⏰ We\'ll remind you again in 1 hour'); }}
      onDismiss={closeOverlay}
      onDirections={() => { closeOverlay(); showToast('🧭 Opening directions...'); }}
    />,
    reminder: <ReminderModal
      med={reminderMed}
      snoozeCount={reminderSnoozes}
      snoozeCap={SNOOZE_CAP}
      isOffline={isOffline}
      initialSheetOpen={!!(overlayData && overlayData.openSheet)}
      onTaken={() => {
        setSnoozeCounts(prev => ({ ...prev, [reminderId]: 0 }));
        // Mark taken in state + persist to backend (real adherence).
        setUserMeds(prev => (prev || medicines).map(m => m.id === reminderId ? { ...m, taken: true, takenAt: new Date().toISOString(), skipped: false } : m));
        const api = window.SaathiPillAPI;
        if (api && api.enabled && api.hasSession() && reminderMed && reminderMed.doseLogId && !isOffline) {
          api.markDose(reminderMed.doseLogId, 'take').catch(function () {});
        }
        if (reminderMed && reminderMed.doseLogId) closeDoseNotification(reminderMed.doseLogId);
        closeOverlay();
        showToast(isOffline ? 'Marked taken — pending sync to caregiver' : '✓ Marked as taken!', isOffline ? { kind: 'offline' } : {});
      }}
      onSnooze={() => {
        const next = reminderSnoozes + 1;
        setSnoozeCounts(prev => ({ ...prev, [reminderId]: next }));
        // Tell the backend to re-remind in 10 min (worker honours nextRemindAt).
        const api = window.SaathiPillAPI;
        if (api && api.enabled && api.hasSession() && reminderMed && reminderMed.doseLogId && !isOffline) {
          api.markDose(reminderMed.doseLogId, 'snooze').catch(function () {});
        }
        if (reminderMed && reminderMed.doseLogId) closeDoseNotification(reminderMed.doseLogId);
        if (next >= SNOOZE_CAP) {
          // L-06: cap reached — log as probable miss and escalate
          showToast(`Snooze limit reached (${SNOOZE_CAP}) — escalating to caregiver`, { kind: 'offline', duration: 3500 });
          setOverlayScreen('escalation');
        } else {
          closeOverlay();
          showToast(`⏰ Snoozed 10 min · ${SNOOZE_CAP - next} snooze${SNOOZE_CAP - next > 1 ? 's' : ''} left`);
        }
      }}
      onSkip={(reason) => {
        closeOverlay();
        if (reason) {
          // Issue #4: stamp the skip with TODAY's date so it auto-clears tomorrow
          // (the MedicineCard only treats med.skipped as active if skipDate === today)
          const today = new Date();
          const skipDate = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;
          setUserMeds(prev => (prev || medicines).map(m => m.id === reminderId ? {
            ...m,
            skipped: true,
            skipDate,
            taken: false,
            skipReason: reason.label,
            skipIcon: reason.icon,
            skipExcluded: !!reason.excludesFromAdherence,
          } : m));
          // Persist the skip to the backend (real adherence).
          const api = window.SaathiPillAPI;
          if (api && api.enabled && api.hasSession() && reminderMed && reminderMed.doseLogId && !isOffline) {
            api.markDose(reminderMed.doseLogId, 'skip', { skipReason: reason.label, skipExcluded: !!reason.excludesFromAdherence }).catch(function () {});
          }
          if (reminderMed && reminderMed.doseLogId) closeDoseNotification(reminderMed.doseLogId);
          if (reason.openSymptoms) {
            // Side effects → capture what they're feeling for the doctor report.
            setOverlayScreen('logSymptoms');
            showToast('🤒 Dose skipped — tell us what you\'re feeling', { duration: 3200 });
          } else {
            const excluded = reason.excludesFromAdherence;
            showToast(`${reason.icon} Skipped (${reason.label.toLowerCase()})${excluded ? ' — excluded from adherence %' : ''}`, { duration: 3200 });
          }
        }
      }}
      onStopMed={(m) => {
        // "Doctor told me to stop" — remove the medicine entirely (list + backend);
        // reminders for it stop with it.
        if (reminderMed && reminderMed.doseLogId) closeDoseNotification(reminderMed.doseLogId);
        closeOverlay();
        handleStopMed(reminderMed || m);
      }}
      onEscalation={() => { setOverlayScreen('escalation'); }}
    />,
    editMed: <EditMedicineScreen
      med={overlayData}
      onClose={closeOverlay}
      onSave={(patch) => {
        const med = overlayData;
        if (!med) { closeOverlay(); return; }
        // Optimistic local update so the card reflects the change instantly.
        setUserMeds(prev => (prev || []).map(x => x.id === med.id ? { ...x, time: patch.time, remindersOn: patch.remindersOn, remindBeforeMin: patch.remindBeforeMin, remindOffsets: patch.remindOffsets || [] } : x));
        const api = window.SaathiPillAPI;
        const finish = () => {
          closeOverlay();
          const offs = (patch.remindOffsets || []).slice().sort((a, b) => b - a);
          const offsLabel = offs.map(o => o === 0 ? 'on time' : o + ' min early').join(', ');
          showToast(patch.remindersOn
            ? `✓ ${med.name} — ${patch.time} · reminds ${offsLabel}`
            : `🔕 ${med.name} — reminders off`);
        };
        if (api && api.enabled && api.hasSession() && med.id) {
          return api.updateMedication(med.id, patch).then(loadRealData).then(finish).catch(() => {
            showToast('⚠ Could not save — check your connection', { duration: 3500 });
            closeOverlay();
          });
        }
        finish();
      }}
    />,
    escalation: <EscalationScreen onClose={closeOverlay} />,
    history: <HistoryScreen onClose={closeOverlay} isNewUser={isNewUser} userAppointments={userAppointments} userSymptoms={userSymptoms} adherenceDaily={adherenceDaily} />,
    analytics: <AnalyticsScreen onClose={closeOverlay} isNewUser={isNewUser} adherenceDaily={adherenceDaily} />,
    report: <DoctorReportScreen onClose={closeOverlay} userName={displayName} userSymptoms={userSymptoms} userMeds={userMeds} adherenceDaily={adherenceDaily} onLogSymptoms={() => { closeOverlay(); navigate('logSymptoms'); }} />,
    offline: <OfflineScreen onClose={closeOverlay} />,
    pharmacy: <PharmacyBannerScreen onClose={closeOverlay} />,
    // DRUG INTERACTIONS — hidden, re-enable when ready:
    // interactions: <InteractionsScreen onClose={closeOverlay} />,
    caregiver: <CaregiverScreen
      member={overlayData?.member || { name: 'Mohan (Father)', initials: 'MK', pct: 60, status: '1 dose missed', color: '#E05252', bg: '#FDEAEA' }}
      linkId={overlayData?.linkId || null}
      permissions={overlayData?.permissions || null}
      familyMeds={familyMeds[(overlayData?.member?.name)] || []}
      onAddMed={(member) => { setOverlayData({ forMember: member, caregiverReturn: overlayData }); setOverlayScreen('addMed'); }}
      onClose={closeOverlay}
    />,
    addFamily: <AddFamilyMemberScreen onClose={closeOverlay} onAdded={(member) => {
      // Create the invite when they tap "Send invite"; the screen then stays open
      // on the share step (SMS / copy link) with the invite id in the link.
      const api = window.SaathiPillAPI;
      if (api && api.enabled && api.hasSession() && member) {
        return api.inviteFamily({
          memberName: member.name,
          memberPhone: member.phone,
          relationship: member.relation,
          permissions: member.permissions || [],
        }).then(function (row) {
          showToast('✓ Invite created — now share it');
          return row;
        }).catch(function () {
          showToast('⚠ Could not create the invite — check your connection', { duration: 4000 });
          return null;
        });
      }
      showToast('✓ Invite created — now share it');
      return null;
    }} userName={displayName} />,
  };

  const showBottomNav = screen === 'home' && !overlayScreen;

  // ── Responsive shell ──
  // Real product = a normal website that fills the mobile browser. On a phone we
  // render full-screen with no mockup chrome. On a wide desktop screen we show a
  // centred phone-width preview. The designer tools (navigator + tweaks + phone
  // mockup) only appear when config.devTools is on AND we're on a big screen.
  const CFG = (typeof window !== 'undefined' && window.SAATHIPILL_CONFIG) || {};
  const [isMobile, setIsMobile] = useState(typeof window !== 'undefined' && window.innerWidth <= 600);
  useEffect(() => {
    const onResize = () => setIsMobile(window.innerWidth <= 600);
    window.addEventListener('resize', onResize);
    return () => window.removeEventListener('resize', onResize);
  }, []);
  const showDevTools = !!CFG.devTools && !isMobile;
  const showPhoneFrame = !isMobile && !!tweaks.showPhoneFrame && showDevTools;

  const appInner = (
    <AppInner
      screen={screen} setScreen={setScreen}
      tab={tab} setTab={t => { setTab(t); setScreen(t); setOverlayScreen(null); }}
      overlayScreen={overlayScreen} overlayScreens={overlayScreens}
      closeOverlay={closeOverlay}
      navigate={navigate}
      handleOnboardingDone={handleOnboardingDone}
      handleProfileDone={handleProfileDone}
      handleLogin={handleLogin}
      handleSignUp={handleSignUp}
      handleLogout={handleLogout}
      loadRealData={loadRealData}
      joinData={joinData}
      linkJoinPharmacy={linkJoinPharmacy}
      isNewUser={isNewUser}
      userMeds={userMeds}
      userAppointments={userAppointments}
      handleAddMed={handleAddMed}
      handleToggleMed={handleToggleMed}
      handleStopMed={handleStopMed}
      showBottomNav={showBottomNav}
      toast={toast}
      isOffline={isOffline}
      pendingSync={pendingSync}
      pendingPushes={pendingPushes}
      onAcceptPush={handleAcceptPush}
      onDismissPush={handleDismissPush}
      adherenceDaily={adherenceDaily}
      tweaks={tweaks}
      inviteData={inviteData}
    />
  );

  return (
    <div style={{
      width: '100vw', height: '100vh',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      background: isMobile ? C.cream : 'radial-gradient(ellipse at center, #2C1A10 0%, #0F0A06 100%)',
      fontSize: tweaks.fontSize + 'px',
    }}>
      {isMobile ? (
        // Real mobile-web shell — fills the browser viewport, respects safe areas.
        <div style={{
          position: 'fixed', inset: 0,
          display: 'flex', flexDirection: 'column',
          background: C.cream, overflow: 'hidden',
          paddingTop: 'env(safe-area-inset-top, 0px)',
          paddingBottom: 'env(safe-area-inset-bottom, 0px)',
        }}>
          {appInner}
        </div>
      ) : showPhoneFrame ? (
        <IOSDevice dark={false}>
          <div style={{ height: '100%', display: 'flex', flexDirection: 'column', background: C.cream, paddingTop: 60, paddingBottom: 34 }}>
            {appInner}
          </div>
        </IOSDevice>
      ) : (
        <div style={{
          width: 393, height: 852,
          borderRadius: 48, overflow: 'hidden',
          boxShadow: '0 40px 120px rgba(0,0,0,0.7)',
          position: 'relative',
          display: 'flex', flexDirection: 'column',
          background: C.cream,
        }}>
          {appInner}
        </div>
      )}

      {/* Screen navigator sidebar — designer tool only */}
      {showDevTools && <ScreenNavigator onNavigate={(s, data) => {
        const tabs = ['home', 'family', 'refills', 'profile'];
        if (tabs.includes(s)) {
          setScreen(s);
          setTab(s === 'home' ? 'home' : s);
          setOverlayScreen(null);
        } else if (['splash','onboarding','profileSetup'].includes(s)) {
          setScreen(s);
          setOverlayScreen(null);
        } else {
          setScreen('home');
          setTab('home');
          // For appointmentReminder demo: synthesize a mock appointment if none exists in state
          let nav = data || null;
          if (s === 'appointmentReminder' && !nav) {
            const upcoming = userAppointments && userAppointments[0];
            nav = upcoming || {
              doctor: 'Dr. Priya Sharma',
              specialty: 'cardio',
              date: new Date(Date.now() + 86400000).toISOString(),
              time: '3:30 PM',
              location: 'Apollo Clinic, Indiranagar',
              reason: 'Follow-up on BP medication; ECG results review',
              reminderLead: '1d',
            };
          }
          setOverlayData(nav);
          setOverlayScreen(s);
        }
      }} currentScreen={overlayScreen || screen} />}

      {/* Tweaks Panel — designer tool only */}
      {showDevTools && <TweaksPanel>
        <TweakSection label="Display" />
        <TweakToggle label="Phone frame" value={tweaks.showPhoneFrame} onChange={v => setTweak('showPhoneFrame', v)} />
        <TweakSection label="Typography" />
        <TweakSlider label="Body font size" value={tweaks.fontSize} min={14} max={22} unit="px" onChange={v => setTweak('fontSize', v)} />
        <TweakSection label="Design" />
        <TweakColor label="Accent color" value={tweaks.accentColor} onChange={v => setTweak('accentColor', v)} />
        <TweakSlider label="Corner radius" value={tweaks.cornerRadius} min={8} max={32} unit="px" onChange={v => setTweak('cornerRadius', v)} />
        <TweakSection label="Content" />
        <TweakText label="User name" value={tweaks.userName} onChange={v => setTweak('userName', v)} />
        <TweakSection label="Demo helpers" />
        <TweakToggle label="Show demo OTP hint" value={tweaks.showDemoHints} onChange={v => setTweak('showDemoHints', v)} />
        <TweakToggle label="Simulate offline" value={tweaks.isOffline} onChange={v => setTweak('isOffline', v)} />
      </TweaksPanel>}
    </div>
  );
}

// ── Inner app content (separated so it works with and without frame) ──
function AppInner({ screen, setScreen, tab, setTab, overlayScreen, overlayScreens, closeOverlay, navigate, handleOnboardingDone, handleProfileDone, handleLogin, handleSignUp, handleLogout, loadRealData, isNewUser, userMeds, userAppointments, handleAddMed, handleToggleMed, handleStopMed, showBottomNav, toast, isOffline, pendingSync, pendingPushes, onAcceptPush, onDismissPush, adherenceDaily, tweaks, inviteData, joinData, linkJoinPharmacy }) {

  // Real account name over the demo tweak default (same rule as in App).
  const displayName = (window.SaathiPillAPI && SaathiPillAPI.enabled && SaathiPillAPI.hasSession() && SaathiPillAPI.userName()) || tweaks.userName;

  const handleTabChange = (t) => {
    setTab(t);
  };

  return (
    <div style={{ flex: 1, display: 'flex', flexDirection: 'column', position: 'relative', overflow: 'hidden', background: C.cream }}>

      {/* Base screens */}
      {screen === 'splash' && <SplashScreen onDone={() => {
        // Never block the splash on the network. If there's a saved session, go
        // straight to home and load data in the background; if that session turns
        // out to be invalid, fall back to the login screen.
        const api = window.SaathiPillAPI;
        if (api && api.enabled && api.hasSession()) {
          setScreen('home');
          loadRealData().then(ok => {
            if (!ok) { setScreen('auth'); return; }
            // Already signed in and opened an invite link → take them straight
            // to Family where the invite card is waiting, instead of ignoring it.
            if (inviteData) { setTab('family'); setScreen('family'); }
            // Scanned a pharmacy counter QR while signed in → link right away.
            if (linkJoinPharmacy) linkJoinPharmacy();
          }).catch(() => setScreen('auth'));
        } else setScreen('auth');
      }} />}
      {screen === 'auth' && <AuthScreen onLogin={handleLogin || (() => setScreen('home'))} onSignUp={handleSignUp || (() => setScreen('onboarding'))} showDemoHints={tweaks.showDemoHints} invite={inviteData} joinPharmacy={joinData} />}
      {screen === 'onboarding' && <OnboardingScreen onDone={handleOnboardingDone} />}
      {screen === 'profileSetup' && <ProfileSetupScreen onDone={handleProfileDone} />}

      {/* Main app screens */}
      {screen === 'home' && (
        <HomeScreen
          onNavigate={navigate}
          onAddMed={() => navigate('addMed')}
          onLogSymptoms={() => navigate('logSymptoms')}
          onAddAppointment={() => navigate('addAppointment')}
          onAppointmentReminder={(apt) => navigate('appointmentReminder', apt)}
          onReminderClick={(med) => navigate('reminder', med)}
          onEditMed={(med) => navigate('editMed', med)}
          userName={displayName}
          isNewUser={isNewUser}
          userMeds={userMeds}
          userAppointments={userAppointments}
          adherenceDaily={adherenceDaily}
          onToggleMed={handleToggleMed}
          onStopMed={handleStopMed}
          pendingSync={pendingSync}
          pendingPushes={pendingPushes}
          onAcceptPush={onAcceptPush}
          onDismissPush={onDismissPush}
          isOffline={isOffline}
        />
      )}
      {screen === 'family' && (
        <FamilyScreen onNavigate={navigate} isNewUser={isNewUser} inviteLinkId={inviteData && inviteData.link} />
      )}
      {screen === 'refills' && (
        <RefillsScreen onNavigate={navigate} userMeds={userMeds} />
      )}
      {screen === 'profile' && (
        <ProfileScreen onNavigate={navigate} userName={displayName} onLogout={handleLogout} />
      )}

      {/* Bottom Nav */}
      {(screen === 'home' || screen === 'family' || screen === 'refills' || screen === 'profile') && !overlayScreen && (
        <BottomNav activeTab={screen} onTab={setTab} />
      )}

      {/* Overlay screens */}
      {overlayScreen && overlayScreens[overlayScreen] && (
        <div style={{
          position: 'absolute', inset: 0,
          display: 'flex', flexDirection: 'column',
          background: C.cream,
          zIndex: 60,
          animation: 'slideUp 0.3s cubic-bezier(0.4,0,0.2,1)',
        }}>
          {overlayScreens[overlayScreen]}
        </div>
      )}

      {/* Offline indicator banner — improvement #15 */}
      {isOffline && (
        <div style={{
          position: 'absolute', top: 0, left: 0, right: 0,
          padding: '8px 16px',
          background: '#3D2C20', color: C.white,
          fontFamily: fonts.body, fontSize: 12, fontWeight: 600,
          textAlign: 'center',
          zIndex: 250,
          display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8,
        }}>
          <span style={{ width: 8, height: 8, borderRadius: '50%', background: '#FBBF24', animation: 'pulse 1.5s ease-in-out infinite' }} />
          <span>You're offline — reminders & saved data still work</span>
        </div>
      )}

      {/* Toast — improvement #9 (positioned above bottom nav, richer for offline) */}
      {toast && (
        <div style={{
          position: 'absolute',
          bottom: showBottomNav ? 92 : 32,
          left: 16, right: 16,
          background: toast.kind === 'offline' ? '#3D2C20' : C.text,
          color: C.white,
          padding: '14px 18px', borderRadius: 16,
          fontFamily: fonts.body, fontSize: 14, fontWeight: 600,
          boxShadow: '0 12px 32px rgba(0,0,0,0.25)',
          animation: 'toastInBottom 0.32s cubic-bezier(0.34,1.56,0.64,1)',
          zIndex: 200,
          display: 'flex', alignItems: 'center', gap: 12,
        }}>
          {toast.kind === 'offline' && (
            <span style={{ fontSize: 20 }}>📵</span>
          )}
          <span style={{ flex: 1, lineHeight: 1.4 }}>{toast.msg}</span>
        </div>
      )}

      <style>{`
        @keyframes slideUp { from { transform: translateY(40px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes toastInBottom { from { transform: translateY(20px) scale(0.96); opacity: 0; } to { transform: translateY(0) scale(1); opacity: 1; } }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
        @keyframes syncBlink { 0%,100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.35; transform: scale(0.7); } }
      `}</style>
    </div>
  );
}

// ── Screen Navigator Panel ──
const allScreens = [
  { id: 'splash', label: '① Splash', group: 'Onboarding' },
  { id: 'auth', label: '② Login / Sign Up', group: 'Onboarding' },
  { id: 'onboarding', label: '③ Onboarding', group: 'Onboarding' },
  { id: 'profileSetup', label: '④ Profile Setup', group: 'Onboarding' },
  { id: 'home', label: '⑤ Home Dashboard', group: 'Core' },
  { id: 'addMed', label: '⑥ Add Medicine', group: 'Core' },
  { id: 'logSymptoms', label: '⑥ᵇ Log Symptoms', group: 'Core' },
  { id: 'addAppointment', label: '⑥ᶜ Doctor Visit', group: 'Core' },
  { id: 'appointmentReminder', label: '⑥ᵈ Apt. Reminder', group: 'Core' },
  { id: 'reminder', label: '⑦ Reminder Modal', group: 'Reminders' },
  { id: 'escalation', label: '⑧ Escalation Flow', group: 'Reminders' },
  { id: 'history', label: '⑩ Medication History', group: 'Tracking' },
  { id: 'analytics', label: '⑪ Adherence Analytics', group: 'Tracking' },
  { id: 'family', label: '⑫ Family Tab', group: 'Family' },
  { id: 'caregiver', label: '⑬ Caregiver View', group: 'Family' },
  { id: 'addFamily', label: '⑭ Add Family Member', group: 'Family' },
  { id: 'refills', label: '⑮ Refills Tab', group: 'Refills' },
  { id: 'pharmacy', label: '⑯ Pharmacy Banner', group: 'Refills' },
  { id: 'report', label: '⑰ Doctor Report', group: 'More' },
  // DRUG INTERACTIONS — hidden, re-enable when ready:
  // { id: 'interactions', label: '⑱ Drug Interactions', group: 'More' },
  { id: 'profile', label: '⑲ Profile & Settings', group: 'More' },
  { id: 'offline', label: '⑳ Offline State', group: 'More' },
];

function ScreenNavigator({ onNavigate, currentScreen }) {
  const [open, setOpen] = useState(false);
  const groups = [...new Set(allScreens.map(s => s.group))];

  return (
    <>
      {/* Toggle button */}
      <button
        onClick={() => setOpen(v => !v)}
        style={{
          position: 'fixed', left: open ? 240 : 0, top: '50%', transform: 'translateY(-50%)',
          width: 32, height: 64, borderRadius: '0 12px 12px 0',
          background: 'rgba(232,112,90,0.9)', border: 'none', cursor: 'pointer',
          color: '#fff', fontSize: 16, display: 'flex', alignItems: 'center', justifyContent: 'center',
          transition: 'left 0.3s', zIndex: 1000,
          backdropFilter: 'blur(8px)',
        }}
        title="Screen Navigator"
      >
        {open ? '‹' : '›'}
      </button>

      {/* Sidebar */}
      <div style={{
        position: 'fixed', left: 0, top: 0, bottom: 0, width: 240,
        background: 'rgba(20,12,8,0.95)',
        backdropFilter: 'blur(20px)',
        transform: open ? 'translateX(0)' : 'translateX(-100%)',
        transition: 'transform 0.3s cubic-bezier(0.4,0,0.2,1)',
        zIndex: 999, overflow: 'auto',
        borderRight: '1px solid rgba(255,255,255,0.08)',
        padding: '24px 0 24px',
      }}>
        <div style={{ padding: '0 16px 16px', borderBottom: '1px solid rgba(255,255,255,0.08)', marginBottom: 16 }}>
          <div style={{ fontFamily: fonts.heading, fontSize: 18, fontWeight: 800, color: '#fff' }}>💊 Arogya</div>
          <div style={{ fontFamily: fonts.body, fontSize: 11, color: 'rgba(255,255,255,0.4)', marginTop: 2 }}>18 screens · All interactive</div>
        </div>

        {groups.map(group => (
          <div key={group} style={{ marginBottom: 8 }}>
            <div style={{ padding: '6px 16px', fontFamily: fonts.body, fontSize: 10, fontWeight: 700, color: 'rgba(255,255,255,0.3)', letterSpacing: '0.1em' }}>
              {group.toUpperCase()}
            </div>
            {allScreens.filter(s => s.group === group).map(s => {
              const isActive = currentScreen === s.id;
              return (
                <button
                  key={s.id}
                  onClick={() => { onNavigate(s.id); setOpen(false); }}
                  style={{
                    width: '100%', padding: '10px 16px', border: 'none', cursor: 'pointer',
                    background: isActive ? 'rgba(232,112,90,0.2)' : 'transparent',
                    display: 'flex', alignItems: 'center', gap: 8,
                    borderLeft: isActive ? `3px solid ${C.coral}` : '3px solid transparent',
                    transition: 'all 0.15s',
                  }}
                >
                  <span style={{ fontFamily: fonts.body, fontSize: 13, fontWeight: isActive ? 700 : 400, color: isActive ? C.coral : 'rgba(255,255,255,0.65)', textAlign: 'left' }}>
                    {s.label}
                  </span>
                </button>
              );
            })}
          </div>
        ))}
      </div>
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
